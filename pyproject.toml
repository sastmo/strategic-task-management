[tool.pytest.ini_options]
pythonpath = ["."]

[tool.mypy]
python_version = "3.12"
files = ["app.py", "src", "tests"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[tool.ruff]
target-version = "py312"
exclude = [
  "stm_env",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "UP", "RUF"]
ignore = ["E501"]

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
skip_covered = true
show_missing = true
