[tool.mypy]
python_version = "3.12"
files = ["app.py", "src", "tests"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
exclude = [
  "^src/auto_sync\\.py$",
  "^src/dashboard\\.py$",
  "^src/loader\\.py$",
  "^src/schema\\.py$",
  "^src/sync_to_db\\.py$",
  "^src/warehouse\\.py$",
]

[tool.ruff]
target-version = "py312"
exclude = [
  "stm_env",
]

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
skip_covered = true
show_missing = true
omit = [
  "src/auto_sync.py",
  "src/dashboard.py",
  "src/loader.py",
  "src/schema.py",
  "src/sync_to_db.py",
  "src/warehouse.py",
]
