[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "--tb=short"

[tool.mypy]
python_version = "3.12"
files = ["app.py", "src", "tests"]
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[tool.ruff]
target-version = "py312"
exclude = [
  "stm_env",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "C4", "UP", "RUF"]
ignore = ["E501"]

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    # Requires a running Streamlit session — not unit-testable
    "src/presentation/auth_ui.py",
    # Requires live Microsoft Graph API credentials
    "src/infrastructure/graph/client.py",
    # Requires Azure AD credentials
    "src/infrastructure/azure/*",
    # Pure PostgreSQL access layers — covered by integration tests gated on
    # TEST_DATABASE_URL; meaningless to mock at unit-test level
    "src/infrastructure/task_store.py",
    "src/infrastructure/user_repository.py",
]

[tool.coverage.report]
skip_covered = true
show_missing = true
