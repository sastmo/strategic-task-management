name: CI

on:
  push:
    branches:
      - main
      - dev
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_stm
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy

      - name: Verify Python sources compile
        run: python -m compileall src app.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_stm

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Validate Docker Compose configuration
        run: docker compose config
        env:
          POSTGRES_PASSWORD: ci-placeholder
